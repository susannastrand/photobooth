<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Projection Photobooth</title>
    <link rel="stylesheet" href="https://use.typekit.net/dud7oyv.css">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap');
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #000000; --surface: #1a1a1a; --border: #2e2e2e;
        --text: #e8e8e0; --muted: #666; --accent: #FFFFFF; --radius: 6px;
        --font-sans: 'Space Grotesk', system-ui, sans-serif;
        --font-mono: "acumin-pro-semi-condensed", sans-serif;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg); color: var(--text);
        min-height: 100vh; padding: 2rem 1rem 4rem;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        align-items: bottom;
        gap: 2rem;
      }

      .cam-panel {
        width: min(95vw, 900px);
      }
      #live-wrap {
        position: relative;
        background: #000;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        aspect-ratio: 4 / 3;
      }

      #live {
        width: 100%;
        height: 100%;
        display: block;
      }

      #status {
        position: absolute;
        bottom: 8px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.1rem;
        letter-spacing: 0.06em;
        color: #ffffff;
        pointer-events: none;
      }

      .btn-row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }

      #snap-btn {
        flex: 1;
        padding: 12px;
        background: var(--accent);
        color: #0e0e0e;
        border: none;
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        cursor: pointer;
        text-transform: uppercase;
        transition: opacity 0.15s;
      }

      #snap-btn:hover { opacity: 0.85; }
      #snap-btn:disabled { opacity: 0.3; cursor: default; }

      .proj-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: auto;   /* hver rute følger sitt eget karts sideforhold */
  gap: 12px;
  align-items: end;       /* labels på samme linje selv om kartene er ulikt høye */
}
.proj-cell {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.proj-cell canvas {
  max-width: 100%;
  max-height: calc(100% - 20px);
  width: auto;
  height: auto;
}
      .proj-cell {
        background: radial-gradient(circle at 50% 50%, #161616, #000000);
        border-radius: var(--radius);
        padding: 4px 4px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .proj-cell canvas {
        width: 100%;
        height: auto;
        display: block;
        border-radius: var(--radius);
        background: transparent;
      }

      .proj-label {
        font-family: var(--font-mono);
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      @media (max-width: 380px) {
        .proj-grid { grid-template-columns: 1fr; }
      }

      #print-btn {
        flex: 1;
        padding: 12px;
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        font-family: var(--font-mono);
        font-size: 0.85rem;
        letter-spacing: 0.06em;
        cursor: pointer;
        text-transform: uppercase;
        transition: background 0.15s, color 0.15s;
      }

      #print-btn:hover { background: var(--accent); color: #0e0e0e; }
      #print-btn:disabled { opacity: 0.3; cursor: default; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="cam-panel">
        <div id="live-wrap">
          <canvas id="live" width="1200" height="900"></canvas>
          <div id="status">Waiting for camera access…</div>
        </div>
        <div class="btn-row">
          <button id="snap-btn">Take Photo</button>
          <button id="print-btn" disabled>Print for more information</button>
        </div>
      </div>
      
      <div class="proj-grid">
        
        <div class="proj-cell">
          <canvas id="c-mercator"></canvas>
          <div class="proj-label">Mercator</div>
        </div>

        <div class="proj-cell">
          <canvas id="c-goode"></canvas>
          <div class="proj-label">Goode's Homolosine</div>
        </div>

       <div class="proj-cell">
          <canvas id="c-robinson"></canvas>
          <div class="proj-label">Robinson</div>
        </div>
        
        <div class="proj-cell">
          <canvas id="c-peters"></canvas>
          <div class="proj-label">Gall–Peters</div>
        </div>
        
      </div>
    </div>

    <script>
      const channel = new BroadcastChannel("photobooth-wall");

      const BASE = 800;
      const MERCATOR_CLAMP = 80;
      const STEPS = 300;

      const RT = [
        [0,1.0000,0.0000],[5,0.9986,0.0620],[10,0.9954,0.1240],[15,0.9900,0.1860],
        [20,0.9822,0.2480],[25,0.9730,0.3100],[30,0.9600,0.3720],[35,0.9427,0.4340],
        [40,0.9216,0.4958],[45,0.8962,0.5571],[50,0.8679,0.6176],[55,0.8350,0.6769],
        [60,0.7986,0.7346],[65,0.7597,0.7903],[70,0.7186,0.8435],[75,0.6732,0.8936],
        [80,0.6213,0.9394],[85,0.5722,0.9761],[90,0.5322,1.0000]
      ];
      function robInterp(absLat) {
        const idx = absLat / 5;
        const lo = Math.min(Math.floor(idx), RT.length - 2);
        const t = idx - lo;
        return {
          plen: RT[lo][1] + t * (RT[lo+1][1] - RT[lo][1]),
          pdfe: RT[lo][2] + t * (RT[lo+1][2] - RT[lo][2])
        };
      }

      function mollweideTheta(lat_deg) {
        const psi = lat_deg * Math.PI / 180;
        if (Math.abs(lat_deg) >= 90) return Math.sign(lat_deg) * Math.PI / 2;
        let theta = psi;
        for (let i = 0; i < 30; i++) {
          const d = -(2 * theta + Math.sin(2 * theta) - Math.PI * Math.sin(psi))
                    / (2 + 2 * Math.cos(2 * theta));
          theta += d;
          if (Math.abs(d) < 1e-12) break;
        }
        return theta;
      }

      const GOODE_BREAK = 40.44;
      const GOODE_BREAK_R = GOODE_BREAK * Math.PI / 180;
      const THETA_BREAK = mollweideTheta(GOODE_BREAK);
      const MW_Y_BREAK  = Math.SQRT2 * Math.sin(THETA_BREAK);
      const SIN_Y_BREAK = GOODE_BREAK_R;
      const MW_Y_SCALE  = SIN_Y_BREAK / MW_Y_BREAK;

      function goodeCM(lon, lat) {
        if (lat >= 0) return lon <= -40 ? -100 : 30;
        if (lon <= -100) return -160;
        if (lon <=  -20) return  -60;
        if (lon <=   80) return   20;
        return 140;
      }

      function goodeForward(lat, lon) {
        const cm    = goodeCM(lon, lat);
        const dlon_r = (lon - cm) * Math.PI / 180;
        const cm_r   = cm  * Math.PI / 180;
        let gx_rel, gy;
        if (Math.abs(lat) <= GOODE_BREAK) {
          const lat_r = lat * Math.PI / 180;
          gx_rel = dlon_r * Math.cos(lat_r);
          gy     = lat_r;
        } else {
          const theta = mollweideTheta(lat);
          gx_rel = (2 * Math.SQRT2 / Math.PI) * dlon_r * Math.cos(theta);
          gy     = Math.SQRT2 * Math.sin(theta) * MW_Y_SCALE;
        }
        const gx_global = (cm_r + gx_rel) / Math.PI;
        const gy_global = gy / (Math.PI / 2);
        return [gx_global, gy_global];
      }

      function forward(lat, lon, projKey) {
        switch (projKey) {
          case 'mercator': {
            const lat_r = lat * Math.PI / 180;
            return [lon / 180, Math.log(Math.tan(Math.PI/4 + lat_r/2)) / Math.PI];
          }
          case 'peters': {
            return [lon / 180, Math.sin(lat * Math.PI / 180)];
          }
          case 'robinson': {
            const ROB_Y_SCALE = 1.3523 / (0.8487 * Math.PI);
            const absLat = Math.min(Math.abs(lat), 90);
            const sign   = lat >= 0 ? 1 : -1;
            const { plen, pdfe } = robInterp(absLat);
            return [(lon / 180) * plen, sign * pdfe * ROB_Y_SCALE];
          }
          case 'goode': {
            return goodeForward(lat, lon);
          }
        }
        return [lon/180, lat/90];
      }

      function computeBBox(projKey) {
        let mnX=Infinity, mxX=-Infinity, mnY=Infinity, mxY=-Infinity;
        const latT = projKey==='mercator' ?  MERCATOR_CLAMP : 90;
        const latB = projKey==='mercator' ? -MERCATOR_CLAMP : -90;
        const N = 600;
        for (let i=0; i<=N; i++) {
          const lon = -180 + 360*i/N;
          for (let j=0; j<=N; j++) {
            const lat = latB + (latT-latB)*j/N;
            const [x,y] = forward(lat, lon, projKey);
            if (!isFinite(x)||!isFinite(y)) continue;
            if(x<mnX)mnX=x; if(x>mxX)mxX=x; if(y<mnY)mnY=y; if(y>mxY)mxY=y;
          }
        }
        return { minX:mnX, maxX:mxX, minY:mnY, maxY:mxY, w:mxX-mnX, h:mxY-mnY };
      }

      const BBOX = {
        mercator: computeBBox('mercator'),
        peters:   computeBBox('peters'),
        robinson: computeBBox('robinson'),
        goode:    computeBBox('goode'),
      };

      const DIMS = {};
      for (const [key, box] of Object.entries(BBOX)) {
        const aspect = box.w / box.h;
        if (aspect >= 1) {
          DIMS[key] = { w: BASE, h: Math.round(BASE / aspect) };
        } else {
          DIMS[key] = { w: Math.round(BASE * aspect), h: BASE };
        }
      }

      function toPixel(x, y, projKey) {
        const box = BBOX[projKey];
        const dim = DIMS[projKey];
        const margin = 0.985;
        const px = (x - box.minX) / box.w * dim.w * margin + dim.w * (1 - margin) / 2;
        const py = (box.maxY - y) / box.h * dim.h * margin + dim.h * (1 - margin) / 2;
        return [px, py];
      }

      function projectPoint(lat, lon, projKey) {
        const [x,y] = forward(lat, lon, projKey);
        return toPixel(x, y, projKey);
      }

      function inverseRobinson(x, y) {
        const ROB_Y_SCALE = 1.3523 / (0.8487 * Math.PI);
        const y_unscaled = y / ROB_Y_SCALE;
        const absPdfe = Math.abs(y_unscaled);
        const sign    = y >= 0 ? 1 : -1;
        let lo = 0;
        for (let i=0; i<RT.length-1; i++) { if (RT[i][2] <= absPdfe) lo=i; else break; }
        const hi = Math.min(lo+1, RT.length-1);
        const denom = RT[hi][2] - RT[lo][2];
        const t     = denom > 1e-10 ? (absPdfe - RT[lo][2]) / denom : 0;
        const absLat = (lo + t) * 5;
        const plen   = RT[lo][1] + t * (RT[hi][1] - RT[lo][1]);
        if (plen < 1e-6) return null;
        const lon2 = (x / plen) * 180;
        if (lon2 < -180 || lon2 > 180) return null;
        return [sign * Math.min(absLat, 90), lon2];
      }

      function inverseMollweideTheta(gy_normalised) {
        const sinTheta = gy_normalised * (Math.PI/2) / (Math.SQRT2 * MW_Y_SCALE);
        if (Math.abs(sinTheta) > 1) return null;
        return Math.asin(sinTheta);
      }

      function inverseGoode(x_norm, y_norm) {
        const gy_abs = Math.abs(y_norm);
        const gy_break_norm = GOODE_BREAK_R / (Math.PI/2);
        const isMollweide = gy_abs > gy_break_norm;
        let lat;
        if (isMollweide) {
          const theta = inverseMollweideTheta(y_norm);
          if (theta === null) return null;
          lat = Math.asin((2*theta + Math.sin(2*theta)) / Math.PI) * 180 / Math.PI;
        } else {
          lat = y_norm * 90;
        }
        const cmOptions = lat >= 0 ? [-100, 30] : [-160, -60, 20, 140];
        for (const cm of cmOptions) {
          const cm_r    = cm * Math.PI / 180;
          const gx_rel  = x_norm * Math.PI - cm_r;
          let lon;
          if (isMollweide) {
            const theta = inverseMollweideTheta(y_norm);
            if (theta === null) continue;
            const cosTheta = Math.cos(theta);
            if (Math.abs(cosTheta) < 1e-8) { lon = cm; }
            else { lon = cm + gx_rel / ((2*Math.SQRT2/Math.PI) * cosTheta) * 180/Math.PI; }
          } else {
            const lat_r = lat * Math.PI / 180;
            const cosLat = Math.cos(lat_r);
            if (Math.abs(cosLat) < 1e-8) { lon = cm; }
            else { lon = cm + gx_rel / cosLat * 180/Math.PI; }
          }
          let lonMin, lonMax;
          if (lat >= 0) {
            if (cm === -100) { lonMin=-180; lonMax=-40; }
            else             { lonMin=-40;  lonMax=180; }
          } else {
            if (cm===-160) { lonMin=-180; lonMax=-100; }
            else if(cm===-60) { lonMin=-100; lonMax=-20; }
            else if(cm===20)  { lonMin=-20;  lonMax=80; }
            else              { lonMin=80;   lonMax=180; }
          }
          if (lon >= lonMin - 0.5 && lon <= lonMax + 0.5) {
            return [lat, Math.max(-180, Math.min(180, lon))];
          }
        }
        return null;
      }

      function inverseLatLon(x, y, projKey) {
        switch (projKey) {
          case 'mercator': {
            const lat_r = 2*Math.atan(Math.exp(y*Math.PI)) - Math.PI/2;
            return [lat_r*180/Math.PI, x*180];
          }
          case 'peters': {
            const lat = Math.asin(Math.max(-1,Math.min(1,y))) * 180/Math.PI;
            return [lat, x*180];
          }
          case 'robinson': return inverseRobinson(x, y);
          case 'goode':    return inverseGoode(x, y);
        }
        return [y*90, x*180];
      }

      const LAT_LINES = [], LON_LINES = [];
      for (let l=-80; l<=80; l+=20) LAT_LINES.push(l);
      for (let l=-160; l<=160; l+=20) LON_LINES.push(l);

      function drawGraticule(ctx, projKey) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth   = 0.8;
        const latT = projKey==='mercator' ?  MERCATOR_CLAMP : 90;
        const latB = projKey==='mercator' ? -MERCATOR_CLAMP : -90;

        for (const lat of LAT_LINES) {
          ctx.beginPath(); let started=false, prevPx=null;
          for (let i=0; i<=STEPS; i++) {
            const lon = -180 + 360*i/STEPS;
            const pt  = projectPoint(lat, lon, projKey);
            if (prevPx !== null && Math.abs(pt[0]-prevPx) > DIMS[projKey].w*0.12) started=false;
            if (!started) { ctx.moveTo(pt[0],pt[1]); started=true; }
            else ctx.lineTo(pt[0],pt[1]);
            prevPx = pt[0];
          }
          ctx.stroke();
        }

        for (const lon of LON_LINES) {
          ctx.beginPath(); let started=false, prevPy=null;
          for (let i=0; i<=STEPS; i++) {
            const lat = latB + (latT-latB)*i/STEPS;
            const pt  = projectPoint(lat, lon, projKey);
            if (prevPy !== null && Math.abs(pt[1]-prevPy) > DIMS[projKey].h*0.12) started=false;
            if (!started) { ctx.moveTo(pt[0],pt[1]); started=true; }
            else ctx.lineTo(pt[0],pt[1]);
            prevPy = pt[1];
          }
          ctx.stroke();
        }
        ctx.restore();
      }

      const LOBE_DEFS = [
        { lonMin:-180, lonMax:-40,  latMin:0,   latMax:90  },
        { lonMin:-40,  lonMax:180,  latMin:0,   latMax:90  },
        { lonMin:-180, lonMax:-100, latMin:-90, latMax:0   },
        { lonMin:-100, lonMax:-20,  latMin:-90, latMax:0   },
        { lonMin:-20,  lonMax:80,   latMin:-90, latMax:0   },
        { lonMin:80,   lonMax:180,  latMin:-90, latMax:0   },
      ];

      function getOutlinePath(projKey) {
        const path = new Path2D();
        const N = 300;
        const latT = projKey==='mercator' ?  MERCATOR_CLAMP : 90;
        const latB = projKey==='mercator' ? -MERCATOR_CLAMP : -90;

        if (projKey === 'goode') {
          for (const lobe of LOBE_DEFS) {
            const pts = [];
            for (let i=0; i<=N; i++) pts.push(projectPoint(lobe.latMax, lobe.lonMin+(lobe.lonMax-lobe.lonMin)*i/N, 'goode'));
            for (let i=0; i<=N; i++) pts.push(projectPoint(lobe.latMax+(lobe.latMin-lobe.latMax)*i/N, lobe.lonMax, 'goode'));
            for (let i=0; i<=N; i++) pts.push(projectPoint(lobe.latMin, lobe.lonMax+(lobe.lonMin-lobe.lonMax)*i/N, 'goode'));
            for (let i=0; i<=N; i++) pts.push(projectPoint(lobe.latMin+(lobe.latMax-lobe.latMin)*i/N, lobe.lonMin, 'goode'));
            path.moveTo(pts[0][0], pts[0][1]);
            for (const p of pts) path.lineTo(p[0], p[1]);
            path.closePath();
          }
          return path;
        }

        const top=[],right=[],bottom=[],left=[];
        for (let i=0;i<=N;i++) top.push(   projectPoint(latT, -180+360*i/N, projKey));
        for (let i=0;i<=N;i++) right.push( projectPoint(latT+(latB-latT)*i/N, 180, projKey));
        for (let i=0;i<=N;i++) bottom.push(projectPoint(latB, 180-360*i/N, projKey));
        for (let i=0;i<=N;i++) left.push(  projectPoint(latB+(latT-latB)*i/N, -180, projKey));

        path.moveTo(top[0][0], top[0][1]);
        for (const p of top)    path.lineTo(p[0], p[1]);
        for (const p of right)  path.lineTo(p[0], p[1]);
        for (const p of bottom) path.lineTo(p[0], p[1]);
        for (const p of left)   path.lineTo(p[0], p[1]);
        path.closePath();
        return path;
      }

      function applyProjectionBW(srcCtx, dstCtx, projKey) {
        const box  = BBOX[projKey];
        const dim  = DIMS[projKey];
        const srcW = srcCtx.canvas.width;
        const srcH = srcCtx.canvas.height;

        const src = srcCtx.getImageData(0, 0, srcW, srcH);
        const dst = dstCtx.createImageData(dim.w, dim.h);
        const sd  = src.data, dd = dst.data;

        const margin = 0.985;
        const offX   = dim.w * (1 - margin) / 2;
        const offY   = dim.h * (1 - margin) / 2;
        const projW  = dim.w * margin;
        const projH  = dim.h * margin;

        const tolX = box.w / projW * 1.5;
        const tolY = box.h / projH * 1.5;

        for (let py = 0; py < dim.h; py++) {
          for (let px = 0; px < dim.w; px++) {
            const x =  (px - offX) / projW * box.w + box.minX;
            const y = -(py - offY) / projH * box.h + box.maxY;

            const inv = inverseLatLon(x, y, projKey);
            if (inv === null) { dd[(py*dim.w+px)*4+3]=0; continue; }
            const [lat, lon] = inv;

            const [fx, fy] = forward(lat, lon, projKey);
            if (Math.abs(fx-x) > tolX || Math.abs(fy-y) > tolY) {
              dd[(py*dim.w+px)*4+3]=0; continue;
            }

            const srcX = Math.round((lon/180 + 1) / 2 * srcW);
            const srcY = Math.round((-lat/90 + 1) / 2 * srcH);

            const di = (py*dim.w+px)*4;
            if (srcX>=0 && srcX<srcW && srcY>=0 && srcY<srcH) {
              const si = (srcY*srcW+srcX)*4;
              const lum = sd[si]*0.299 + sd[si+1]*0.587 + sd[si+2]*0.114;
              dd[di]=lum; dd[di+1]=lum; dd[di+2]=lum; dd[di+3]=sd[si+3];
            } else {
              dd[di+3]=0;
            }
          }
        }
        dstCtx.putImageData(dst, 0, 0);
      }

      const canvases = {
        mercator: document.getElementById('c-mercator'),
        peters:   document.getElementById('c-peters'),
        robinson: document.getElementById('c-robinson'),
        goode:    document.getElementById('c-goode'),
      };
      for (const [key,c] of Object.entries(canvases)) { c.width=DIMS[key].w; c.height=DIMS[key].h; }

      function renderAll(sourceCanvas) {
        const SRC = sourceCanvas.width;
        const tmp  = document.createElement('canvas');
        tmp.width = SRC; tmp.height = SRC;
        const tCtx = tmp.getContext('2d');
        tCtx.save(); tCtx.scale(-1,1); tCtx.drawImage(sourceCanvas,-SRC,0,SRC,SRC); tCtx.restore();

        for (const [key, canvas] of Object.entries(canvases)) {
          canvas.width = DIMS[key].w; canvas.height = DIMS[key].h;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0,0,DIMS[key].w,DIMS[key].h);

          const outline = getOutlinePath(key);
          ctx.save(); ctx.clip(outline,'evenodd');
          applyProjectionBW(tCtx, ctx, key);
          drawGraticule(ctx, key);
          ctx.restore();

          ctx.save();
          ctx.strokeStyle='rgba(232,232,224,0.55)';
          ctx.lineWidth=1.5;
          ctx.stroke(outline);
          ctx.restore();
        }

        document.getElementById('print-btn').disabled = false;
      }

      function resetBooth() {
        // Tøm de fire projeksjonsbildene og gå tilbake til startposisjon.
        // Kameraet (video-strømmen og live-loopen) røres ikke og fortsetter å kjøre.
        for (const canvas of Object.values(canvases)) {
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        document.getElementById('print-btn').disabled = true;
        if (cameraReady) statusEl.textContent = 'Ready — get close';
      }

      const liveCanvas = document.getElementById('live');
      const liveCtx    = liveCanvas.getContext('2d');
      const statusEl   = document.getElementById('status');
      const video      = document.createElement('video');
      video.autoplay=true; video.playsInline=true; video.muted=true;
      video.setAttribute('playsinline','');

      let rafId=null, cameraReady=false;

      function startDrawLoop() {
        if (rafId) cancelAnimationFrame(rafId);
        function drawLive() {
          if (video.readyState >= 2) {
            const w=liveCanvas.width, h=liveCanvas.height;
            liveCtx.save(); liveCtx.scale(-1,1); liveCtx.drawImage(video,-w,0,w,h); liveCtx.restore();
            if (!cameraReady) { cameraReady=true; statusEl.textContent='Ready — get close'; }
          }
          rafId = requestAnimationFrame(drawLive);
        }
        drawLive();
      }

      function fallbackToUpload(message) {
        statusEl.textContent = message;
        const btn = document.getElementById('snap-btn');
        btn.textContent = 'Upload Photo';
        btn.replaceWith(btn.cloneNode(true));
        document.getElementById('snap-btn').addEventListener('click', () => {
          const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
          inp.onchange = e => {
            if (!e.target.files[0]) return;
            const img=new Image();
            img.onload = () => {
              liveCtx.clearRect(0,0,BASE,BASE);
              liveCtx.drawImage(img,0,0,BASE,BASE);
              renderAll(liveCanvas);
              statusEl.textContent='Photo loaded';
            };
            img.src=URL.createObjectURL(e.target.files[0]);
          };
          inp.click();
        });
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        fallbackToUpload('Camera not supported — upload a photo instead');
      } else {
        statusEl.textContent = 'Requesting camera access…';
        navigator.mediaDevices.getUserMedia({ video:{facingMode:'user',width:{ideal:BASE},height:{ideal:BASE}}, audio:false })
        .then(stream => {
          video.srcObject = stream;
          const p=video.play();
          if (p) p.catch(()=>{ statusEl.textContent='Tap to start camera'; document.body.addEventListener('click',()=>video.play(),{once:true}); });
          video.addEventListener('loadedmetadata', startDrawLoop, {once:true});
          setTimeout(()=>{ if(!cameraReady) startDrawLoop(); }, 1500);
          stream.getVideoTracks()[0].addEventListener('ended', ()=>fallbackToUpload('Camera disconnected'));
        }).catch(err => {
          let msg='No camera access — upload a photo instead';
          if (err.name==='NotAllowedError')  msg='Camera access denied';
          if (err.name==='NotFoundError')    msg='No camera found — upload a photo instead';
          if (err.name==='NotReadableError') msg='Camera in use by another app';
          fallbackToUpload(msg);
        });
      }

      document.getElementById('snap-btn').addEventListener('click', () => {
        if (!video.srcObject) return;

        renderAll(liveCanvas);
        statusEl.textContent = '✓ Photo taken';

        try {
          const wallChannel = new BroadcastChannel('photobooth-wall');
          wallChannel.postMessage({
            type: 'new-photo',
            images: {
              mercator: canvases.mercator.toDataURL('image/jpeg', 0.85),
              peters:   canvases.peters.toDataURL('image/jpeg', 0.85),
              robinson: canvases.robinson.toDataURL('image/jpeg', 0.85),
              goode:    canvases.goode.toDataURL('image/jpeg', 0.85),
            },
            timestamp: Date.now(),
          });
          wallChannel.close();
        } catch(e) {}
      });

      function printImages() {
        // Rekkefølge ovenfra og ned: Mercator, Goode's, Robinson, Gall–Peters
        const keys   = ['mercator','goode','robinson','peters'];
        const labels = ['Mercator',"Goode's Homolosine",'Robinson','Gall–Peters'];
        const imgs   = keys.map(k => canvases[k].toDataURL('image/png'));

        // Sideformat: 74 x 420 mm. Bildene skal passe inn i området 0–235 mm fra toppen.
        const PAGE_W      = 74;   // mm
        const PAGE_H      = 420;  // mm
const AREA_TOP    = 5;      // mm
const AREA_BOTTOM = 240;    // mm
const AREA_H      = AREA_BOTTOM - AREA_TOP;

const LABEL_GAP = 1;
const LABEL_H   = 4;
const BOX_GAP   = 4;
const N         = keys.length;
const SAFE_MARGIN = 3;
const AVAILABLE_H = AREA_H - SAFE_MARGIN;
const totalFixedHeight =
  N * (LABEL_H + LABEL_GAP) +
  (N - 1) * BOX_GAP;
const imageBudgetTotal = AVAILABLE_H - totalFixedHeight;

        const MAX_IMG_W = PAGE_W; // bildet kan aldri bli bredere enn siden


        // Alle boksene skal ha SAMME bredde (som Robinson, helt ut til kanten).
        // Finn den største felles bredden som gjør at summen av alle høydene
        // fortsatt får plass i høydebudsjettet, og bruk PAGE_W som tak.
        const invAspectSum = keys.reduce((sum, k) => sum + canvases[k].height / canvases[k].width, 0);
        const widthFromBudget = imageBudgetTotal / invAspectSum;
        const COMMON_W = Math.min(MAX_IMG_W, widthFromBudget);

        // Bredden er lik for alle; høyden følger hvert bildes ekte sideforhold,
        // slik at ingenting croppes eller strekkes.
        const sizes = keys.map(k => {
          const c = canvases[k];
          const aspect = c.width / c.height;
          const w = COMMON_W;
          const h = w / aspect;
          return { w, h };
        });

const imageHeight = sizes.reduce((sum, s) => sum + s.h, 0);
const totalHeight =
  imageHeight + totalFixedHeight;
if (totalHeight > AVAILABLE_H) {
  const scale =
    (AVAILABLE_H - totalFixedHeight) / imageHeight;
  sizes.forEach(s => {
    s.w *= scale;
    s.h *= scale;
  });
}
        const win = window.open('','_blank');
        win.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="https://use.typekit.net/dud7oyv.css">
<style>
  @page { size: ${PAGE_W}mm ${PAGE_H}mm; margin: 0; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: ${PAGE_W}mm; height: ${PAGE_H}mm; background: #fff; }
  body {
    position: relative;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .strip {
    position: absolute;
    top: ${AREA_TOP}mm;
    left: 0;
    width: ${PAGE_W}mm;
    height: ${AREA_H}mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: ${BOX_GAP}mm;
  }
  .lbl {
    margin-top: ${LABEL_GAP}mm;
    font-family: "acumin-pro-semi-condensed", sans-serif;
    font-weight: 300;
    font-style: normal;
    font-size: 8pt;
    line-height: 1;
    color: #000000;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
  }
  .box img {
    display: block;
    object-fit: contain;
  }
</style>
</head><body>
<div class="strip">
${sizes.map((s,i)=>`<div class="box"><img src="${imgs[i]}" style="width:${s.w.toFixed(2)}mm;height:${s.h.toFixed(2)}mm;"><div class="lbl">${labels[i]}</div></div>`).join('\n')}
</div>
</body></html>`);
        win.document.close();
        win.onload = () => {
          win.focus();
          win.print();
          win.close();
          // window.print() blokkerer til print-dialogen er lukket i de aller
          // fleste nettlesere, så dette kjører rett etter man har printet/avbrutt.
          resetBooth();
        };
      }

      document.getElementById('print-btn').addEventListener('click', printImages);
    </script>
  </body>
</html>
